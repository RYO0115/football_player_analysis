# =============================================================
# Claude への指令テンプレート(YAML)
# =============================================================
# 使い方:
#   1. このファイルをコピーして書き換える(例: task.yaml)
#      置き場所は任意。使い捨てなら drafts/ やスクラッチでOK。
#   2. Claude Code に「task.yaml を読んで実行して」とだけ入力する。
#   3. 不要な任意項目は行ごと削除してよい(残すより消す方が読みやすい)。
#
# 設計方針:
#   - 必須は goal / context / deliverables の3つだけ。
#   - 「何をしてほしいか(goal)」と「何ができたら完了か(acceptance)」を
#     分けて書くと、Claude の自己判断のブレが最も減る。
#   - 禁止事項(do_not)は自由記述より効く。触ってほしくないファイルや
#     やってほしくない操作はここに明示する。
# =============================================================

# --- 必須 -----------------------------------------------------

goal: >
  一文で「何を達成してほしいか」。
  例: tools/session-digest のエラーハンドリングを改善する

context: >
  背景・経緯。なぜこれをやるのか、これまで何を試したか。
  Claude がリポジトリから読み取れないこと(意図・事情)だけを書く。

deliverables:
  # 成果物。ファイルパスや形式まで具体的に
  - 例: notes/engineering/foo.md に新規ノート
  - 例: 修正済みの tools/xxx/main.py

# --- 任意(不要な項目は削除) ---------------------------------

inputs:
  # 参照してほしい素材。URL / ファイルパス / 過去の成果物
  - 例: references/some-article.md
  - 例: https://example.com/article

scope:
  include:
    # 触ってよい範囲
    - 例: tools/session-digest/ 以下のみ
  exclude:
    # 触ってはいけない範囲
    - 例: drafts/publish-schedule.json

constraints:
  # 守ってほしい条件(技術選定・文体・文字数など)
  - 例: 標準ライブラリのみ、依存追加なし
  - 例: voice.md の文体に従う

do_not:
  # 禁止事項。曖昧な指示より確実に効く
  - 例: git push しない
  - 例: 既存テストを書き換えない

acceptance:
  # 完了条件。「これが全部YESなら完了」と機械的に判定できる形で
  - 例: uv run pytest が全件パス
  - 例: 【★…】プレースホルダが残っていない

process:
  # 進め方の指定があれば(なければ削除 = Claude に任せる)
  plan_first: false        # true = 実装前に計画を提示して承認を待つ
  ask_when_unsure: true    # true = 迷ったら質問 / false = 自己判断で進める
  steps:
    - 例: まず現状を調査して報告
    - 例: 承認後に実装

output:
  # 報告のしかた
  language: ja
  format: 例: 変更点の箇条書き + 動作確認結果
